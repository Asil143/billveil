    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://billveil.com/#website",
          "url": "https://billveil.com",
          "name": "BillVeil",
          "description": "AI-powered medical billing transparency tools — free for every American.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": { "@type": "EntryPoint", "urlTemplate": "https://billveil.com/?q={search_term_string}" },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "WebApplication",
          "@id": "https://billveil.com/#webapp",
          "name": "BillVeil",
          "url": "https://billveil.com",
          "description": "44 AI-powered tools to understand, fight, and reduce medical bills. Dispute overcharges, fight insurance denials, find drug savings, know your patient rights. Free. No signup required.",
          "applicationCategory": "HealthApplication",
          "operatingSystem": "Web",
          "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.9",
            "reviewCount": "15000",
            "bestRating": "5"
          }
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "How much does BillVeil cost?",
              "acceptedAnswer": { "@type": "Answer", "text": "You get 3 analyses with no account required. After that, create an account with just your phone number to continue — no password, no credit card. We accept optional tips but never require them." }
            },
            {
              "@type": "Question",
              "name": "Is my medical information safe?",
              "acceptedAnswer": { "@type": "Answer", "text": "We never store, log, or share what you enter. Every analysis is processed and immediately discarded. All data is encrypted in transit with 256-bit TLS and nothing is retained on our servers." }
            },
            {
              "@type": "Question",
              "name": "Can I actually negotiate a medical bill?",
              "acceptedAnswer": { "@type": "Answer", "text": "Yes — over 60% of patients who negotiate their medical bills get a reduction. BillVeil gives you the exact dispute letter, negotiation script, and legal rights you need to fight back." }
            },
            {
              "@type": "Question",
              "name": "What if my insurance company ignores my appeal?",
              "acceptedAnswer": { "@type": "Answer", "text": "Under the ACA and ERISA, insurers must respond within 30–60 days. If denied again, you have the right to a free external review. 73% of externally reviewed denials are overturned." }
            }
          ]
        }
      ]
    }
    </script>
